name: Build APK with Expo EAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install pnpm
      run: npm install -g pnpm@8.15.0

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install EAS CLI
      run: npm install -g eas-cli

    - name: Build APK with EAS
      run: |
        export EAS_BUILD_NO_EXPO_GO_WARNING=true
        mkdir -p build-output
        eas build --platform android --profile preview --non-interactive --wait --output ./build-output/app.apk
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      continue-on-error: true

    - name: Check build output
      run: |
        echo "Checking for build artifacts..."
        find . -name "*.apk" -type f 2>/dev/null | head -20
        ls -la build-output/ 2>/dev/null || echo "build-output directory not found"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: invoice-pro-app-apk
        path: |
          build-output/
          **/*.apk
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build-output/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
