name: Build APK with Expo EAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install pnpm
      run: npm install -g pnpm@8.15.0

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install EAS CLI
      run: npm install -g eas-cli

    - name: Build APK with EAS
      run: |
        export EAS_BUILD_NO_EXPO_GO_WARNING=true
        eas build --platform android --profile preview --non-interactive --wait
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: List all files
      if: always()
      run: |
        echo "=== Current directory ==="
        pwd
        echo ""
        echo "=== All files in current directory ==="
        ls -la
        echo ""
        echo "=== Search for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"
        echo ""
        echo "=== Check home directory ==="
        ls -la ~ 2>/dev/null | head -20

    - name: Upload any APK found
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: invoice-pro-app-apk
        path: |
          ./**/*.apk
          ~/*.apk
        if-no-files-found: warn
        retention-days: 30
